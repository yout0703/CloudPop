<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudPop — 115 账号登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a42;
      border-radius: 16px;
      padding: 40px 48px;
      width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
    .qr-container {
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-container img {
      width: 200px;
      height: 200px;
      border-radius: 8px;
      border: 3px solid #2a2a42;
    }
    .qr-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,15,26,0.9);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.85rem;
    }
    .qr-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a42;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 16px;
      min-height: 1.2em;
    }
    .status-text.success { color: #22c55e; }
    .status-text.error   { color: #ef4444; }
    .status-text.scanned { color: #3b82f6; }
    .btn {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #3b82f6); color: #fff; }
    .btn-ghost   { background: transparent; color: #888; border: 1px solid #2a2a42; }
    .instructions { color: #888; font-size: 0.82rem; margin-top: 20px; line-height: 1.6; }
    .instructions strong { color: #bbb; }
    .actions { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">CloudPop</div>
  <div class="subtitle">使用 115 账号扫码登录</div>

  <div class="qr-container" id="qrContainer">
    <img id="qrImage" src="" alt="二维码" />
    <div class="qr-overlay" id="qrOverlay">
      <div class="spinner" id="loadingSpinner"></div>
      <span id="overlayText">正在生成二维码…</span>
    </div>
  </div>

  <div class="status-text" id="statusText">请打开 115 App 扫描上方二维码</div>

  <div class="actions">
    <button class="btn btn-ghost"  id="refreshBtn" onclick="startQR()">刷新二维码</button>
    <a href="/" class="btn btn-ghost">返回首页</a>
  </div>

  <div class="instructions">
    <strong>操作步骤：</strong><br/>
    1. 打开手机端 115 App<br/>
    2. 点击右上角扫一扫<br/>
    3. 扫描上方二维码并确认登录<br/>
    4. 等待页面自动跳转
  </div>
</div>

<script>
const qrImage    = document.getElementById('qrImage');
const qrOverlay  = document.getElementById('qrOverlay');
const overlayTxt = document.getElementById('overlayText');
const statusTxt  = document.getElementById('statusText');
const spinner    = document.getElementById('loadingSpinner');
const refreshBtn = document.getElementById('refreshBtn');

let pollTimer = null;
let currentUid = null;

function showOverlay(text, showSpinner = true) {
  qrOverlay.classList.remove('hidden');
  overlayTxt.textContent = text;
  spinner.style.display = showSpinner ? 'block' : 'none';
}

function hideOverlay() {
  qrOverlay.classList.add('hidden');
}

function setStatus(text, cls = '') {
  statusTxt.textContent = text;
  statusTxt.className = 'status-text ' + cls;
}

function stopPolling() {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
}

async function startQR() {
  stopPolling();
  currentUid = null;
  showOverlay('正在生成二维码…');
  setStatus('');
  refreshBtn.disabled = true;

  try {
    const res = await fetch('/api/auth/qr/start', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { uid, qr_image_url } = await res.json();
    currentUid = uid;
    qrImage.onload = () => hideOverlay();
    qrImage.onerror = () => showOverlay('二维码图片加载失败', false);
    qrImage.src = qr_image_url;
    setStatus('请打开 115 App 扫描上方二维码');
    schedulePoll();
  } catch (e) {
    showOverlay('获取二维码失败，请刷新重试', false);
    setStatus('连接 115 服务器失败：' + e.message, 'error');
  } finally {
    refreshBtn.disabled = false;
  }
}

function schedulePoll() {
  pollTimer = setTimeout(pollStatus, 2000);
}

async function pollStatus() {
  if (!currentUid) return;
  try {
    const res = await fetch(`/api/auth/qr/status/${currentUid}`);
    if (!res.ok) { schedulePoll(); return; }
    const { status, status_text } = await res.json();

    switch (status) {
      case 0:
        setStatus('等待扫码…');
        schedulePoll();
        break;
      case 1:
        setStatus('已扫码，请在手机上确认登录', 'scanned');
        schedulePoll();
        break;
      case 2:
        setStatus('扫码成功，正在保存登录信息…', 'success');
        await confirmLogin();
        break;
      case -1:
        showOverlay('二维码已过期', false);
        setStatus('二维码已过期，请点击「刷新二维码」', 'error');
        break;
      case -2:
        showOverlay('已取消登录', false);
        setStatus('您已取消登录，请点击「刷新二维码」重试', 'error');
        break;
      default:
        schedulePoll();
    }
  } catch (e) {
    schedulePoll(); // 网络异常时静默重试
  }
}

async function confirmLogin() {
  try {
    const res = await fetch('/api/auth/qr/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid: currentUid }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    setStatus('登录成功！3秒后跳转…', 'success');
    // 刷新设置并跳转首页
    setTimeout(() => { window.location.href = '/'; }, 3000);
  } catch (e) {
    setStatus('保存登录信息失败：' + e.message, 'error');
  }
}

// 页面加载时自动开始
startQR();
</script>
</body>
</html>
