<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudPop 控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #05050a;
      --card: rgba(15, 15, 30, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #8b5cf6, #3b82f6);
      --green: #10b981;
      --red: #ef4444;
      --text: #f8fafc;
      --muted: #94a3b8;
      --glass: rgba(255, 255, 255, 0.03);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- Navigation --- */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      z-index: 100;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    .status-items {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 10px var(--muted);
    }

    .dot.online {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .dot.offline {
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
    }

    .btn-login {
      background: var(--accent-gradient);
      border: none;
      color: white;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    /* --- Workspace Layout --- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      padding: 20px;
      overflow: hidden;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .workspace-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    .workspace-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    /* --- Base Card --- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
    }

    .card-title i {
      color: var(--accent);
    }

    /* --- Action Panel --- */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .action-card {
      padding: 20px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .action-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .action-card.primary {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1));
      border-color: rgba(139, 92, 246, 0.2);
    }

    .action-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .action-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
    }

    .btn:hover:not(:disabled) {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* --- Folder Section --- */
    .folder-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--glass);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .folder-icon {
      font-size: 1.5rem;
    }

    .folder-info {
      flex: 1;
      min-width: 0;
    }

    .folder-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .current-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* --- Logs --- */
    .log-container {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .log-content {
      flex: 1;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .log-line {
      margin-bottom: 4px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease-out;
    }

    .log-ts {
      color: #555;
      margin-right: 8px;
    }

    .log-info {
      color: #ccc;
    }

    .log-success {
      color: var(--green);
    }

    .log-error {
      color: var(--red);
    }

    .log-warn {
      color: #fbbf24;
    }

    /* --- Stats Panel --- */
    .stats-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: var(--glass);
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .stat-label {
      color: var(--muted);
    }

    .stat-value {
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    /* --- Spinner --- */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .loading .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      width: 500px;
      max-height: 80vh;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .modal-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .folder-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .folder-item:hover {
      background: var(--glass);
    }

    .folder-item.selected {
      background: rgba(139, 92, 246, 0.2);
      border: 1px solid var(--accent);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">CloudPop</div>
    <div class="status-items">
      <div class="status-badge">
        <div class="dot" id="authDot"></div>
        <span id="authLabel">核验中</span>
      </div>
      <button class="btn-login" id="authBtn" onclick="window.location.href='/login'" style="display:none">115
        登录</button>
    </div>
  </header>

  <main>
    <div class="workspace-left">
      <!-- 同步任务 -->
      <div class="card">
        <div class="card-title">
          <span>🚀 任务调度</span>
        </div>
        <div class="action-grid">
          <div class="action-card primary" onclick="runSync()" id="syncBtn">
            <span class="action-name">一键全量同步</span>
            <span class="action-desc">依次执行扫描和生成，最简单的同步方案。</span>
            <div class="spinner"></div>
          </div>
          <div class="action-card" onclick="runAction('scan')" id="scanBtn">
            <span class="action-name">目录深度扫描</span>
            <span class="action-desc">仅建立当前目录下的文件索引。</span>
            <div class="spinner"></div>
          </div>
          <div class="action-card" onclick="runAction('generate')" id="generateBtn">
            <span class="action-name">生成 STRM</span>
            <span class="action-desc">将索引文件导出为 Plex 可读的 .strm。</span>
            <div class="spinner"></div>
          </div>
          <div class="action-card" onclick="clearCache()" id="clearCacheBtn">
            <span class="action-name">清空 API 缓存</span>
            <span class="action-desc">强制清理 115 获取的下载加速链接缓存。</span>
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- 日志 -->
      <div class="log-container">
        <div class="log-header">
          <span>RUNNING CONSOLE</span>
          <span style="cursor:pointer" onclick="clearLog()">Clear</span>
        </div>
        <div class="log-content" id="logContent">
          <div class="log-line">Initializing system events...</div>
        </div>
      </div>
    </div>

    <div class="workspace-right">
      <!-- 配置 -->
      <div class="card">
        <div class="card-title">⚙️ 扫描配置</div>
        <div class="folder-section">
          <div class="folder-icon">📂</div>
          <div class="folder-info">
            <div class="folder-label">Target Cloud Directory</div>
            <div class="current-path" id="scanFolderPath">/</div>
          </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px;">
          <button class="btn" onclick="openFolderPicker()">更改目录</button>
          <button class="btn" onclick="resetScanFolder()" id="resetBtn" style="display:none">重置根</button>
        </div>
      </div>

      <!-- 状态 -->
      <div class="card">
        <div class="card-title">📟 运行状态</div>
        <div class="stats-list" id="healthStats">
          <div class="stat-item"><span class="stat-label">Service</span><span class="stat-value"
              id="svcStatus">...</span></div>
          <div class="stat-item"><span class="stat-label">Version</span><span class="stat-value"
              id="svcVersion">...</span></div>
          <div class="stat-item"><span class="stat-label">Auth 115</span><span class="stat-value" id="svc115">...</span>
          </div>
          <div class="stat-item" style="flex-direction:column; gap:8px">
            <span class="stat-label">Plex Output Path</span>
            <span class="stat-value" id="svcOutputDir" style="font-size:0.75rem; color:var(--muted)">...</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="folderModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="font-weight:600">选择 115 文件夹</h3>
        <button class="btn" style="padding:4px 8px" onclick="closeFolderPicker()">✕</button>
      </div>
      <div style="padding: 8px 20px; font-size: 0.85rem; color: var(--muted); background: rgba(0,0,0,0.2)"
        id="modalBreadcrumb">/</div>
      <div class="modal-body" id="folderList"></div>
      <div class="modal-footer">
        <button class="btn" id="upBtn" onclick="goUp()">返回上级</button>
        <button class="btn btn-primary" id="confirmFolderBtn" disabled onclick="confirmFolder()">确认选择</button>
      </div>
    </div>
  </div>

  <script>
    const logContent = document.getElementById('logContent');

    function log(msg, cls = 'info') {
      const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-ts">[${ts}]</span><span class="log-${cls}">${escHtml(msg)}</span>`;
      logContent.appendChild(line);
      logContent.scrollTop = logContent.scrollHeight;
    }

    function clearLog() { logContent.innerHTML = ''; }
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function setLoading(id, loading) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.toggle('loading', loading);
        const btn = el.tagName === 'BUTTON' ? el : null;
        if (btn) btn.disabled = loading;
      }
    }

    // --- State & Config ---
    async function loadScanFolder() {
      try {
        const res = await fetch('/api/config/scan-folder');
        const { folder_id, folder_path } = await res.json();
        const el = document.getElementById('scanFolderPath');
        const resetBtn = document.getElementById('resetBtn');
        if (folder_id === '0' || folder_id === '') {
          el.textContent = '/ (根目录)';
          resetBtn.style.display = 'none';
        } else {
          el.textContent = folder_path;
          resetBtn.style.display = 'block';
        }
      } catch (e) { el.textContent = 'ERROR'; }
    }

    async function resetScanFolder() {
      if (!confirm('重置为全量同步（扫描 115 根目录）？')) return;
      await fetch('/api/config/scan-folder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder_id: '0', folder_path: '/' }),
      });
      await loadScanFolder();
      log('已重置为扫描根目录', 'info');
    }

    // --- Actions ---
    async function runAction(action) {
      const btnId = action + 'Btn';
      setLoading(btnId, true);
      log(`开始执行: ${action}...`);
      try {
        const res = await fetch(`/api/${action}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

        if (action === 'scan') {
          log(`扫描完成: 共发现 ${data.total_videos || 0} 个视频文件`, 'success');
        } else {
          log(`生成 STRM 完成: 新增 ${data.created || 0}, 跳过 ${data.skipped || 0}, 错误 ${data.errors || 0}`, 'success');
        }
      } catch (e) {
        log(`${action} 失败: ${e.message}`, 'error');
      } finally {
        setLoading(btnId, false);
      }
    }

    async function runSync() {
      setLoading('syncBtn', true);
      log('>> 开始全量同步流水线 (扫描 + 生成)...');
      try {
        // Step 1: Scan
        let res = await fetch('/api/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        let data = await res.json();
        if (!res.ok) throw new Error(`扫描阶段失败: ${data.detail}`);
        log(`扫描阶段完成: ${data.total_videos || 0} 文件`, 'success');

        // Step 2: Generate
        res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        data = await res.json();
        if (!res.ok) throw new Error(`生成阶段失败: ${data.detail}`);
        log(`同步流水线执行成功!`, 'success');
        log(`[结果] 新增:${data.created} 跳过:${data.skipped} 耗时:${data.duration_seconds}s`, 'info');
      } catch (e) {
        log(`流水线中断: ${e.message}`, 'error');
      } finally {
        setLoading('syncBtn', false);
      }
    }

    async function clearCache() {
      setLoading('clearCacheBtn', true);
      try {
        const res = await fetch('/api/cache', { method: 'DELETE' });
        const data = await res.json();
        log(`缓存已清除 (${data.deleted_count || 0} 条)`, 'success');
      } catch (e) { log('清除失败', 'error'); }
      finally { setLoading('clearCacheBtn', false); }
    }

    // --- Auth & Health ---
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const { configured, uid } = await res.json();
        const dot = document.getElementById('authDot');
        const label = document.getElementById('authLabel');
        const btn = document.getElementById('authBtn');
        if (configured) {
          dot.className = 'dot online';
          label.textContent = `UID: ${uid}`;
        } else {
          dot.className = 'dot offline';
          label.textContent = '未登录';
          btn.style.display = 'block';
        }
      } catch (e) { document.getElementById('authLabel').textContent = 'ERROR'; }
    }

    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        document.getElementById('svcStatus').textContent = data.status || 'OFFLINE';
        document.getElementById('svcVersion').textContent = data.version || 'v?';
        const ok = data.providers?.['115']?.authenticated;
        document.getElementById('svc115').textContent = ok ? 'ACTIVE' : 'FAIL';

        const cfgRes = await fetch('/api/config');
        if (cfgRes.ok) {
          const cfg = await cfgRes.json();
          document.getElementById('svcOutputDir').textContent = cfg.output_dir || 'UNDEFINED';
        }
      } catch (e) { document.getElementById('svcStatus').textContent = 'STOPPED'; }
    }

    // --- Folder Picker (Basic Implementation) ---
    let folderStack = [];
    let selectedFolder = null;

    function openFolderPicker() {
      document.getElementById('folderModal').classList.add('open');
      browseFolders('0', '/');
    }
    function closeFolderPicker() { document.getElementById('folderModal').classList.remove('open'); }

    async function browseFolders(id, path) {
      const list = document.getElementById('folderList');
      list.innerHTML = '<div style="padding:20px; text-align:center; color:#555">Loading folders...</div>';
      document.getElementById('modalBreadcrumb').textContent = path;
      document.getElementById('upBtn').disabled = folderStack.length === 0;

      try {
        const res = await fetch(`/api/folders?folder_id=${id}`);
        const data = await res.json();
        list.innerHTML = '';
        if (data.items.length === 0) list.innerHTML = '<div style="padding:20px; color:#555">无子文件夹</div>';

        data.items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'folder-item';
          div.innerHTML = `<span>📁</span> <span>${escHtml(item.name)}</span>`;
          div.onclick = () => {
            document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedFolder = { id: item.id, path: `${path.replace(/\/$/, '')}/${item.name}` };
            document.getElementById('confirmFolderBtn').disabled = false;
          };
          div.ondblclick = () => {
            folderStack.push({ id, path });
            browseFolders(item.id, `${path.replace(/\/$/, '')}/${item.name}`);
          };
          list.appendChild(div);
        });
      } catch (e) { list.innerHTML = 'Load Fail'; }
    }

    function goUp() {
      const p = folderStack.pop();
      if (p) browseFolders(p.id, p.path);
    }

    async function confirmFolder() {
      if (!selectedFolder) return;
      await fetch('/api/config/scan-folder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder_id: selectedFolder.id, folder_path: selectedFolder.path }),
      });
      loadScanFolder();
      closeFolderPicker();
      log(`扫描目录已更新: ${selectedFolder.path}`, 'success');
    }

    // Init
    checkAuth();
    checkHealth();
    loadScanFolder();
  </script>
</body>

</html>
