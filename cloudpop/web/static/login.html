<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudPop — 登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --border: #262626;
      --text: #f5f5f5;
      --text-secondary: #737373;
      --accent: #e5e5e5;
      --success: #22c55e;
      --error: #ef4444;
      --info: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 360px;
    }

    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .brand p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }

    .qr-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
      background: white;
      border-radius: 8px;
      padding: 12px;
    }

    .qr-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .qr-wrapper img.loaded {
      opacity: 1;
    }

    .qr-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 8px;
      transition: opacity 0.3s;
    }

    .qr-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-secondary);
      min-height: 20px;
      transition: color 0.3s;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
    .status.info { color: var(--info); }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--border);
      border-color: var(--text-secondary);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .help {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .help-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .help ol {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.8;
      padding-left: 16px;
    }

    .help li {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <h1>CloudPop</h1>
      <p>使用 115 账号扫码登录</p>
    </div>

    <div class="card">
      <div class="qr-wrapper">
        <img id="qrImage" alt="二维码" />
        <div class="qr-overlay" id="qrOverlay">
          <div class="spinner"></div>
          <span id="overlayText">加载中...</span>
        </div>
      </div>

      <div class="status" id="statusText">请打开 115 App 扫描二维码</div>

      <div class="actions">
        <button class="btn" id="refreshBtn" onclick="startQR()">刷新</button>
        <a href="/" class="btn" style="text-decoration:none; text-align:center">返回</a>
      </div>

      <div class="help">
        <div class="help-title">操作步骤</div>
        <ol>
          <li>打开手机端 115 App</li>
          <li>点击右上角扫一扫</li>
          <li>扫描上方二维码并确认登录</li>
          <li>等待页面自动跳转</li>
        </ol>
      </div>
    </div>
  </div>

<script>
const qrImage = document.getElementById('qrImage');
const qrOverlay = document.getElementById('qrOverlay');
const overlayTxt = document.getElementById('overlayText');
const statusTxt = document.getElementById('statusText');
const refreshBtn = document.getElementById('refreshBtn');

let pollTimer = null;
let currentUid = null;

function showOverlay(text) {
  qrOverlay.classList.remove('hidden');
  overlayTxt.textContent = text;
}

function hideOverlay() {
  qrOverlay.classList.add('hidden');
}

function setStatus(text, cls) {
  statusTxt.textContent = text;
  statusTxt.className = 'status' + (cls ? ' ' + cls : '');
}

function stopPolling() {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
}

async function startQR() {
  stopPolling();
  currentUid = null;
  showOverlay('加载中...');
  setStatus('');
  refreshBtn.disabled = true;
  qrImage.classList.remove('loaded');

  try {
    const res = await fetch('/api/auth/qr/start', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { uid, qr_image_url } = await res.json();
    currentUid = uid;
    qrImage.onload = () => {
      hideOverlay();
      qrImage.classList.add('loaded');
    };
    qrImage.onerror = () => showOverlay('加载失败');
    qrImage.src = qr_image_url;
    setStatus('请打开 115 App 扫描二维码');
    schedulePoll();
  } catch (e) {
    showOverlay('获取失败，请刷新');
    setStatus('连接失败: ' + e.message, 'error');
  } finally {
    refreshBtn.disabled = false;
  }
}

function schedulePoll() {
  pollTimer = setTimeout(pollStatus, 2000);
}

async function pollStatus() {
  if (!currentUid) return;
  try {
    const res = await fetch(`/api/auth/qr/status/${currentUid}`);
    if (!res.ok) { schedulePoll(); return; }
    const { status, status_text } = await res.json();

    switch (status) {
      case 0:
        setStatus('等待扫码...');
        schedulePoll();
        break;
      case 1:
        setStatus('请在手机上确认登录', 'info');
        schedulePoll();
        break;
      case 2:
        setStatus('登录成功，正在跳转...', 'success');
        await confirmLogin();
        break;
      case -1:
        showOverlay('二维码已过期');
        setStatus('二维码已过期，请刷新', 'error');
        break;
      case -2:
        showOverlay('已取消登录');
        setStatus('登录已取消，请刷新重试', 'error');
        break;
      default:
        schedulePoll();
    }
  } catch (e) {
    schedulePoll();
  }
}

async function confirmLogin() {
  try {
    const res = await fetch('/api/auth/qr/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid: currentUid }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    setTimeout(() => { window.location.href = '/'; }, 1500);
  } catch (e) {
    setStatus('登录失败: ' + e.message, 'error');
  }
}

startQR();
</script>
</body>
</html>
